x-common:
  database: &db-environment
    # Do not remove the "&db-password" from the end of the line below, it is important
    # for Paymenter functionality.
    MYSQL_PASSWORD: &db-password ${DB_PASSWORD}
    MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

#
# ------------------------------------------------------------------------------------------
# DANGER ZONE BELOW
#
# The remainder of this file likely does not need to be changed. Please only make modifications
# below if you understand what you are doing.
#

services:
  database:
    image: mariadb:lts
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "./database:/var/lib/mysql"
    environment:
      APP_NAME: ${APP_NAME:-Paymenter}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Chicago}

      DB_CONNECTION: mariadb
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-paymenter}
      DB_USERNAME: ${DB_USERNAME:-paymenter}
      DB_PASSWORD: *db-password

      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: cache
      REDIS_PORT: 6379
      REDIS_PASSWORD: null

      FILESYSTEM_DISK: local
      SESSION_LIFETIME: 120
      TRUSTED_PROXIES: "*"
      PAYMENTER_SKIP_DEFAULT: "false"
      
    networks:
      - paymenter_nw

  cache:
    image: redis:alpine
    restart: always
    networks:
      - paymenter_nw

  paymenter:
    build:
      context: .
      dockerfile: Dockerfile
    image: paymenter-ioncube:latest
    restart: always
    expose:
      - "80"
    volumes:
      - "./:/app/var/"
      - "./storage/logs:/app/storage/logs"
      - "./storage/public:/app/storage/app/public"
      - "./themes:/app/themes"
      - "./extensions:/app/extensions"
      - "app:/app"
    environment:
      DB_PASSWORD: *db-password
      APP_ENV: "production"
      CACHE_STORE: "redis"
      REDIS_HOST: "cache"
      DB_CONNECTION: "mariadb"
      DB_HOST: "database"
      DB_PORT: "3306"
      # Set to "true" to skip renewal of default themes and extensions
      # By default, default themes and extensions are always renewed on startup
      PAYMENTER_SKIP_DEFAULT: "false"
    networks:
      - paymenter_nw

  # Asset Builder Service - used to build frontend assets (themes/extensions)
  asset-builder:
    image: node:22-alpine
    profiles: ["build"]
    working_dir: /app
    volumes:
      - "./themes:/app/themes"
      - "./extensions:/app/extensions"
      - "./:/app/var"
      - "app:/app"
    command: >
      sh -c "echo 'Asset Builder ready for npm commands' &&
      echo 'Working directory: /app' &&
      echo 'Usage: docker compose run --rm asset-builder npm install && npm run build' &&
      tail -f /dev/null"
    networks:
      - paymenter_nw

networks:
  paymenter_nw:
    driver: bridge

volumes:
  app: